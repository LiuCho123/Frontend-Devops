version: '3.8'
services:
  db:
    build:
      context: ../database-devops
    container_name: db_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin_password
      MYSQL_DATABASE: proyecto_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network

  backend:
    build:
      context: ../backend-devops
    container_name: backend_api
    restart: always
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=admin_password
      - DB_NAME=proyecto_db
      - DB_PORT=3306
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    build:
      context: .
    container_name: frontend_web
    restart: always
    environment:
      - PORT=5000
      - BACKEND_URL=http://backend:3000
    ports:
      - "5000:5000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge